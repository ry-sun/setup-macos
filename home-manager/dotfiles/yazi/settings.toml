# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio = [3, 5, 10]
sort_by = "natural"
sort_sensitive = true
sort_reverse = false
sort_dir_first = true
sort_translit = true
linemode = "size"
show_hidden = true
show_symlink = true
mouse_events = ["click", "scroll", "touch", "move", "drag"]

[preview]
wrap = "yes"
max_width = 1080
max_height = 1920
image_quality = 90

[opener]
edit = [
    { run = "nvim %s", desc = "edit with NeoVim", for = "macos", block = true },
    { run = "zed %s", desc = "edit with Zed", for = "macos" },
    { run = "code %s", desc = "edit with VsCode", for = "macos" },
]
play = [
    { run = "open -a IINA %s", desc = "Play with IINA", for = "macos", orphan = true },
    { run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "macos" },
]
open = [{ run = "open %s", desc = "Open", for = "macos" }]
reveal = [{ run = "open -R %s1", desc = "Reveal", for = "macos" }]
exifinfo = [
    { run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
extract = [{ run = "extract %s", desc = "Extract here" }]
download = [
    { run = "ya emit download --open %S", desc = "Download and open" },
    { run = "ya emit download %S", desc = "Download" },
]

[open]
rules = [
    # Folder
    { url = "*/", use = [
        "edit",
        "open",
        "reveal",
        "exifinfo",
    ] },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
        "extract",
        "reveal",
        "exifinfo",
    ] },
    { url = "*.{a,ace,alz,arc,arj,bz,bz2,cab,cpio,deb,gz,jar,lha,lz,lzh,lzma,lzo,rar,rpm,rz,war,whl,xpi,xz,Z,zip,7z}", use = [
        "extract",
        "reveal",
        "exifinfo",
    ] },
    # Text
    { mime = "text/*", use = [
        "edit",
        "reveal",
        "exifinfo",
    ] },
    # Image
    { mime = "image/*", use = [
        "open",
        "reveal",
        "exifinfo",
    ] },
    # Media
    { mime = "{audio,video}/*", use = [
        "play",
        "reveal",
        "exifinfo",
    ] },
    # Code
    { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [
        "edit",
        "reveal",
        "exifinfo",
    ] },
    # Empty file
    { mime = "inode/empty", use = [
        "edit",
        "reveal",
        "exifinfo",
    ] },
    # Virtual file system
    { mime = "vfs/{absent,stale}", use = "download" },
    # Fallback
    { url = "*", use = [
        "open",
        "reveal",
        "exifinfo",
    ] },
]

[plugin]
prepend_fetchers = [
    { id = "git", url = "*", run = "git", group = "git" },
    { id = "git", url = "*/", run = "git", group = "git" },
    { id = "ffmpeg_stats", mime = "video/*", run = "ffmpeg-stats" },
]
preloaders = [
    # SQLite
    { mime = "application/vnd.sqlite3", run = "sqlite-preview" },
    { mime = "application/sqlite3", run = "sqlite-preview" },
    { url = "*.{sqlite,sqlite3}", run = "sqlite-preview" },
    # DuckDB
    { url = "*.{tsv,parquet,xlsx}", run = "duckdb" },
    # Blender
    { url = "*.blend", run = "blender-preview" },
    { url = "*.blend1", run = "blender-preview" },
    # 3d objects
    { url = "*.{3mf,obj,pts,ply,stl,step,stp}", run = "f3d-preview" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Office documents and slide decks
    { url = "*.{doc,docx,docm,odt,rtf,ppt,pptx,pptm,odp,pages,numbers,key}", run = "office-preview" },
    # Typst
    { url = '*.typ', run = 'preview-typst' },
    # Font
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
]
previewers = [
    # Folder
    { url = "*/", run = "folder" },
    # CSV
    { url = "*.csv", run = "rich-preview" },
    # Markdown
    { url = "*.md", run = "rich-preview" },
    # RST
    { url = "*.rst", run = "rich-preview" },
    # Jupyter Notebook
    { url = "*.ipynb", run = "rich-preview" },
    # SQLite
    { mime = "application/vnd.sqlite3", run = "sqlite-preview" },
    { mime = "application/sqlite3", run = "sqlite-preview" },
    { url = "*.{sqlite,sqlite3}", run = "sqlite-preview" },
    # DuckDB
    { url = "*.{tsv,parquet,xlsx,db,duckdb}", run = "duckdb" },
    # Office documents and slide decks
    { url = "*.{doc,docx,docm,odt,rtf,ppt,pptx,pptm,odp,pages,numbers,key}", run = "office-preview" },
    # HTML
    { url = "*.{html,htm}", run = "html-preview" },
    # Blender
    { url = "*.blend", run = "blender-preview" },
    { url = "*.blend1", run = "blender-preview" },
    # 3d objects
    { url = "*.{3mf,obj,pts,ply,stl,step,stp}", run = "f3d-preview" },
    # djuv
    { mime = "image/djvu", run = "djvu-view" },
    # JSON
    { mime = "application/{json,ndjson}", run = "json" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # Audio
    { mime = "audio/*", run = "exifaudio" },
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Typst
    { url = '*.typ', run = 'preview-typst' },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
    { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
    { url = "*.{AppImage,appimage,a,ace,alz,arc,arj,bz,bz2,cab,cpio,deb,gz,jar,lha,lz,lzh,lzma,lzo,rar,rpm,rz,war,whl,xpi,xz,Z,zip,7z}", run = "archive" },
    # Virtual Disk / Disk Image
    { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
    { mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
    { url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
    # Font
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
    # Empty file
    { mime = "inode/empty", run = "empty" },
    # Virtual file system
    { mime = "vfs/*", run = "vfs" },
    # Code
    { mime = "text/*", run = "code" },
    { mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
    # Error
    { mime = "null/*", run = "null" },
    # Fallback
    { url = "*", run = "piper -- exiftool $1" },
]

[input]
cursor_blink = true

[pick]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 14]
