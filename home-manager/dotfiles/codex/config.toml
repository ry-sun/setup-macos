# Basic
model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
check_for_update_on_startup = true

# Command Settings
allow_login_shell = true
approval_policy = "on-request"
web_search = "cached"

[history]
persistence = "save-all"

approvals_reviewer = "user"
service_tier = "default"
notify = ["~/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

# TUI Settings
file_opener = "none"
hide_agent_reasoning = false

[tui]
alternate_screen = "auto"
animations = true
notifications = true
otification_method = "auto"
show_tooltips = true
status_line = [
    "model-with-reasoning",
    "project-root",
    "git-branch",
    "context-usage",
    "five-hour-limit",
    "weekly-limit",
    "thread-title",
]
theme = "dracula"

[tui.model_availability_nux]
"gpt-5.5" = 4

# memories Settings
[memories]
disable_on_external_context = true
generate_memories = true
use_memories = true

# Sub-Agents Settings
[agents]
max_depth = 1
max_threads = 8

# Analytics Settings
[analytics]
enable = true

# see https://developers.openai.com/codex/config-basic#supported-features
[features]
app = true
codex_git_commit = true
hooks = false
enable_request_compression = true
fast_mode = false
multi_agent = true
personality = true
prevent_idle_sleep = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
smart_approvals = true
undo = true
unified_exec = true
memories = true
goals = true
chronicle = true
js_repl = false

# Plugins
[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[marketplaces.openai-primary-runtime]
last_updated = "2026-06-15T00:50:14Z"
source_type = "local"
source = "~/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

[marketplaces.openai-bundled]
last_updated = "2026-06-18T09:40:55Z"
source_type = "local"
source = "~/.codex/.tmp/bundled-marketplaces/openai-bundled"

[mcp_servers.node_repl]
args = []
command = "/Applications/Codex.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/Applications/Codex.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/Applications/Codex.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "~/.codex"
CODEX_HOME = "~/.codex"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "eb55d24cf065cd5311af6f99b16bade2b7a670790ff2db9accf60d012dd55dd1"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives (such as Computer Use) unless the user explicitly mentions an alternative."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "26.611.62324"
CODEX_CLI_PATH = "/Applications/Codex.app/Contents/Resources/codex"

[desktop]
usePointerCursors = false
composerEnterBehavior = "cmdIfMultiline"
reviewDelivery = "detached"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-pull-request-merge-method = "squash"
selected-avatar-id = "stacky"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true
defaultTerminalLocation = "right"
notifications-turn-mode = "always"
appearanceLightCodeThemeId = "raycast"
appearanceDarkCodeThemeId = "catppuccin"
appearanceTheme = "light"

[desktop.appearanceLightChromeTheme]
accent = "#ff6363"
contrast = 45
ink = "#030303"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]
code = '"Jetbrains Mono"'
ui = "Inter"

[desktop.appearanceLightChromeTheme.semanticColors]
